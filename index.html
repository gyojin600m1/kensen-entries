<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026鹿児島県選手権 エントリー検索・レーン配置予想</title>
<style>
:root{--bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--accent:#00c4ff;--accent2:#0077cc;--male:#1565c0;--female:#b71c6e;--text:#e8f0fe;--text2:#8ca0c0;--border:#1e3050;--card-bg:#13203a;--radius:12px;--warn:#e6a23c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;max-width:440px;margin:0 auto;}
.header{background:linear-gradient(135deg,#0a1628,#0d1f3c);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.5);}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.header-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;}
.header-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.tabs{display:flex;margin-bottom:14px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.tab{flex:1;padding:9px 0;text-align:center;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;background:var(--surface2);transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.tab.active{background:linear-gradient(135deg,var(--accent2),#005fa3);color:#fff;}
.gender-filter{display:flex;gap:6px;margin-bottom:12px;}
.gchip{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:700;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.gchip.active-all{background:var(--accent2);border-color:var(--accent);color:#fff;}
.gchip.active-male{background:var(--male);border-color:var(--male);color:#fff;}
.gchip.active-female{background:var(--female);border-color:var(--female);color:#fff;}
.search-wrap{display:flex;gap:8px;margin-bottom:10px;}
.search-input{flex:1;padding:12px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;font-family:inherit;outline:none;}
.search-input::placeholder{color:var(--text2);}
.search-input:focus{border-color:var(--accent);}
.search-btn{padding:12px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.team-toggle{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0 8px;}
.chips-scroll{overflow-x:auto;white-space:nowrap;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips-scroll::-webkit-scrollbar{display:none;}
.chips-wrap{display:none;flex-wrap:wrap;gap:6px;padding-bottom:10px;}
.chips-wrap.show{display:flex;}
.chip{display:inline-block;padding:5px 12px;margin-right:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.chips-wrap .chip{margin-right:0;}
.chip.active{background:var(--accent2);border-color:var(--accent);color:#fff;}
.chip .ct{color:var(--accent);font-size:10px;margin-left:3px;}
.program-select-wrap{margin-bottom:14px;}
.program-select{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;}
.program-select:focus{border-color:var(--accent);}
.program-select option{background:#1a2234;color:#e8f0fe;}
.program-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:transparent;}
.panel{display:none;}
.panel.active{display:block;}
.main{padding:12px 12px 0;}
.status-bar{font-size:12px;color:var(--text2);padding:8px 4px;text-align:center;}
.status-bar span{color:var(--accent);font-weight:600;}
.swimmer-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.swimmer-card.open{border-color:var(--accent2);}
.card-header{padding:14px 14px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.swimmer-name{font-size:16px;font-weight:700;color:var(--text);flex:1;}
.swimmer-yomi{font-size:11px;color:var(--text2);margin-top:2px;font-weight:400;letter-spacing:.5px;}
.badge{font-size:11px;background:var(--accent2);color:#fff;border-radius:10px;padding:2px 9px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.swimmer-team{font-size:13px;color:var(--text2);}
.age-tag{font-size:11px;color:var(--text2);background:var(--surface2);border-radius:6px;padding:1px 7px;}
.gen-tag{font-size:11px;border-radius:6px;padding:1px 8px;font-weight:700;}
.gen-tag.male{background:var(--male);color:#fff;}
.gen-tag.female{background:var(--female);color:#fff;}
.warn-tag{font-size:10px;border-radius:6px;padding:1px 6px;font-weight:700;background:rgba(230,162,60,.18);color:var(--warn);border:1px solid var(--warn);}
.toggle-hint{margin-top:8px;font-size:11px;color:var(--accent);}
.details{display:none;border-top:1px solid var(--border);}
.swimmer-card.open .details{display:block;}
.detail-item{padding:10px 14px;border-bottom:1px solid rgba(30,48,80,0.6);font-size:13px;color:var(--text);line-height:1.5;}
.detail-item:last-child{border-bottom:none;}
.gender-block-title{font-size:14px;font-weight:700;padding:10px 4px 8px;border-bottom:2px solid;margin-bottom:10px;margin-top:16px;}
.gender-block-title.male{color:var(--male);border-color:var(--male);}
.gender-block-title.female{color:var(--female);border-color:var(--female);}
.program-title{font-size:14px;font-weight:700;color:var(--accent);padding:10px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.entry-row{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;}
.entry-rank{font-size:11px;color:var(--text2);margin-right:6px;}
.entry-name{font-size:16px;font-weight:700;color:var(--text);display:inline;}
.entry-yomi{font-size:10px;color:var(--text2);margin-top:1px;letter-spacing:.5px;}
.entry-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.time-tag{font-size:12px;color:var(--accent);font-weight:600;background:rgba(0,196,255,0.1);border-radius:6px;padding:1px 8px;}
.entry-row.clickable{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.entry-row.open{border-color:var(--accent2);}
.entry-hint{font-size:11px;color:var(--accent);margin-top:6px;}
.entry-details{display:none;margin-top:8px;border-top:1px solid var(--border);padding-top:6px;}
.entry-row.open .entry-details{display:block;}
.entry-ev{font-size:13px;padding:5px 2px;color:var(--text2);}
.entry-ev.cur{color:var(--accent);font-weight:700;}
.entry-ev .et{color:var(--accent);}
.no-result{text-align:center;padding:60px 20px;color:var(--text2);}
.no-result .emoji{font-size:40px;margin-bottom:12px;}
.initial-state{text-align:center;padding:40px 20px;color:var(--text2);}
.initial-state .emoji{font-size:48px;margin-bottom:16px;}
.initial-state h3{font-size:16px;color:var(--text);margin-bottom:8px;}
.initial-state p{font-size:13px;line-height:1.7;}
.stats-row{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:var(--accent);}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;}
/* 日程 */
.day-head{font-size:14px;font-weight:700;color:var(--accent);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:14px 0 10px;}
.prog-row{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.prog-row.relay{opacity:.65;cursor:default;}
.prog-no{font-size:13px;font-weight:700;width:30px;text-align:center;flex-shrink:0;color:var(--text2);}
.prog-g{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;flex-shrink:0;}
.prog-g.f{background:var(--female);color:#fff;}.prog-g.m{background:var(--male);color:#fff;}
.prog-ev{flex:1;font-size:14px;font-weight:700;color:var(--text);}
.prog-rnd{font-size:10px;color:var(--text2);background:var(--surface2);border-radius:6px;padding:2px 7px;flex-shrink:0;}
.prog-entries{display:none;padding:2px 0 12px;}
.prog-entries.show{display:block;}
.prog-row.open{border-color:var(--accent2);background:var(--surface);}
.prog-arrow{font-size:11px;color:var(--accent);flex-shrink:0;margin-left:2px;}
/* レーン予想 */
.lane-predict{margin:10px 0 14px;}
.lane-note{font-size:11px;line-height:1.7;color:var(--text2);background:rgba(0,196,255,0.08);border:1px solid rgba(0,196,255,0.2);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.heat-summary{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:10px;padding:0 2px;}
.heat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;overflow:hidden;}
.heat-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
.heat-name{font-size:14px;font-weight:700;color:var(--text);}
.heat-meta{font-size:11px;color:var(--accent);background:rgba(0,196,255,0.12);border-radius:999px;padding:4px 10px;white-space:nowrap;}
.lane-pool{display:flex;flex-direction:column;gap:6px;}
.lane-row{display:flex;align-items:center;gap:10px;min-height:48px;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);background:linear-gradient(90deg,rgba(0,196,255,0.06),rgba(0,119,204,0.16));}
.lane-row.empty{opacity:.5;background:rgba(255,255,255,0.03);}
.lane-num{width:42px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--accent);text-align:center;background:rgba(0,0,0,0.18);border-radius:8px;padding:7px 0;}
.lane-fill{flex:1;min-width:0;}
.lane-swimmer{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lane-sub{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lane-empty-text{font-size:12px;color:var(--text2);}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="header-icon">🏊</div>
    <div>
      <div class="header-title">2026 鹿児島県選手権 兼 JOC予選</div>
      <div class="header-sub">7/4(土)・5(日) 鴨池 ｜ エントリー検索・レーン配置予想</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(1)">🔍 選手</div>
    <div class="tab" onclick="switchTab(2)">📋 種目</div>
    <div class="tab" onclick="switchTab(3)">📅 日程</div>
  </div>
</div>
<div class="main">
  <div class="panel active" id="panel1">
    <div class="gender-filter" id="gf1">
      <div class="gchip active-all" onclick="setGender(1,'all',this)">全員</div>
      <div class="gchip" onclick="setGender(1,'male',this)">🔵 男子</div>
      <div class="gchip" onclick="setGender(1,'female',this)">🔴 女子</div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="名前・ふりがな・チーム名…" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="search-btn" onclick="doSearch()">検索</button>
    </div>
    <div class="chips-scroll" id="chipsArea"></div>
    <button class="team-toggle" id="teamToggle" onclick="toggleAllTeams()">▼ 全チーム一覧を表示（<span id="teamN">-</span>チーム）</button>
    <div class="chips-wrap" id="allTeams"></div>
    <div id="statusBar1" class="status-bar" style="display:none"></div>
    <div id="result1">
      <div class="initial-state">
        <div class="emoji">🔍</div>
        <h3>選手・チームを検索</h3>
        <p>名前（ひらがな・漢字どちらでも可）<br>またはチーム名を入力してください</p>
        <div class="stats-row">
          <div class="stat-item"><div class="stat-num" id="totalCount">-</div><div class="stat-label">総エントリー</div></div>
          <div class="stat-item"><div class="stat-num" id="swimmerCount">-</div><div class="stat-label">参加選手</div></div>
          <div class="stat-item"><div class="stat-num" id="teamCount">-</div><div class="stat-label">チーム</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="panel" id="panel2">
    <div class="gender-filter" id="gf2">
      <div class="gchip active-all" onclick="setGender(2,'all',this)">全員（女子→男子）</div>
      <div class="gchip" onclick="setGender(2,'male',this)">🔵 男子</div>
      <div class="gchip" onclick="setGender(2,'female',this)">🔴 女子</div>
    </div>
    <div class="program-select-wrap">
      <select class="program-select" id="programSelect"><option value="">── 種目を選んでください ──</option></select>
      <button class="program-btn" onclick="searchByProgram()">この種目の出場選手を表示</button>
    </div>
    <div id="statusBar2" class="status-bar" style="display:none"></div>
    <div id="result2"><div class="initial-state"><div class="emoji">📋</div><h3>種目から選手を検索</h3><p>種目を選んで「出場選手を表示」<br>下に組み分けとレーン配置予想図も表示します</p></div></div>
  </div>
  <div class="panel" id="panel3">
    <div class="status-bar">大会要項の競技順序（全70種目）／種目をタップでレーン予想と出場選手を表示</div>
    <div id="progList"></div>
  </div>
</div>

// ひらがな/カタカナ/半角全角 正規化
function normalize(s){
  if(!s) return '';
  s=s.replace(/[\uFF61-\uFF9F]/g,c=>{ // 半角カナ→全角は簡易にコード変換
    return c;
  });
  // 半角カナ→全角カナ
  const half='ｱｲｳｴｵｧｨｩｪｫｶｷｸｹｺｻｼｽｾｿﾀﾁﾂｯﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔｬﾕｭﾖｮﾗﾘﾙﾚﾛﾜｦﾝ';
  const full='アイウエオァィゥェォカキクケコサシスセソタチツッテトナニヌネノハヒフヘホマミムメモヤャユュヨョラリルレロワヲン';
  let r='';
  for(let i=0;i<s.length;i++){
    let ch=s[i];
    // 濁点・半濁点処理
    if(i+1<s.length&&(s[i+1]==='ﾞ'||s[i+1]==='ﾟ')){
      const base=half.indexOf(ch);
      if(base>=0){ch=full[base];}
      const comb=s[i+1]==='ﾞ'?'\u3099':'\u309A';
      r+=(ch+comb).normalize('NFC'); i++; continue;
    }
    const idx=half.indexOf(ch);
    if(idx>=0){r+=full[idx];continue;}
    r+=ch;
  }
  // カタカナ→ひらがな
  r=r.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
  return r.replace(/[\s\u3000]+/g,'').toLowerCase();
}
// 学年/年齢ランク（上位ほど大）
const GR={'一般':24,'大4':23,'大3':22,'大2':21,'大1':20,'高3':18,'高２':17,'高2':17,'高1':16,'中3':15,'中2':14,'中1':13,'小6':12,'小5':11,'小4':10,'小3':9,'小2':8,'小1':7};
function rankKey(s){
  if(GR[s.gr]!==undefined) return GR[s.gr];
  const a=parseInt(s.age); if(!isNaN(a)) return a; // 大学・一般は年齢
  return 0;
}
function tval(t){if(!t||t==='NT')return 9999999;const p=t.split(':');return p.length===2?(+p[0]*60+ +p[1]):+p[0];}
function eventEntries(st,di,gender){
  let ent=sw.flatMap(s=>s.ev.filter(e=>e.st===st&&e.di===di).map(e=>({...s,tm:e.tm})));
  if(gender==='male')ent=ent.filter(isMale);
  if(gender==='female')ent=ent.filter(isFemale);
  return ent;
}
function buildHeatSizes(count){
  if(count<=0)return [];
  if(count<=10)return [count];
  const q=Math.floor(count/10);
  const r=count%10;
  if(r===0)return Array(q).fill(10);
  if(r===1&&q>=1)return [3,8,...Array(q-1).fill(10)];
  return [r,...Array(q).fill(10)];
}
function buildLaneHeats(entries){
  const sizes=buildHeatSizes(entries.length);
  const ordered=entries.slice().sort((a,b)=>tval(b.tm)-tval(a.tm)||rankKey(a)-rankKey(b)||a.name.localeCompare(b.name,'ja'));
  let idx=0;
  return sizes.map((size,heatIndex)=>{
    const block=ordered.slice(idx,idx+size);
    idx+=size;
    const seeded=block.slice().sort((a,b)=>tval(a.tm)-tval(b.tm)||rankKey(b)-rankKey(a)||a.name.localeCompare(b.name,'ja'));
    const lanes=Array.from({length:10},(_,lane)=>({lane,swimmer:null}));
    seeded.forEach((s,i)=>{lanes[LANE_ORDER[i]].swimmer=s;});
    return {heatNo:heatIndex+1,size,lanes};
  });
}
function appendHTML(target,html){

function lanePredictionHTML(title,entries){
  if(!entries.length)return '';

}

// タブ1
function doSearch(kw){
  const input=document.getElementById('searchInput');
  const keyword=normalize(kw||input.value);
  const c=document.getElementById('result1');const sb=document.getElementById('statusBar1');const gen=genderState[1];
  if(!keyword){c.innerHTML='<div class="initial-state"><div class="emoji">🔍</div><h3>キーワードを入力してください</h3></div>';sb.style.display='none';return;}
  let res=sw.filter(s=>normalize(s.name).includes(keyword)||normalize(s.yomi).includes(keyword)||normalize(s.sc).includes(keyword));
  if(gen==='male')res=res.filter(isMale);if(gen==='female')res=res.filter(isFemale);
  // 女子→男子、学年/年齢上位順
  res.sort((a,b)=>{const fa=isFemale(a),fb=isFemale(b);if(fa!==fb)return fa?-1:1;return rankKey(b)-rankKey(a)||b.ev.length-a.ev.length;});
  sb.style.display='block';sb.innerHTML=res.length?`<span>${res.length}</span>名が見つかりました`:`該当する選手が見つかりませんでした`;
  if(!res.length){c.innerHTML=`<div class="no-result"><div class="emoji">😓</div><p>「${kw||input.value}」に一致するエントリーがありません</p></div>`;return;}
  c.innerHTML='';
  res.forEach(s=>{
    const card=document.createElement('div');card.className='swimmer-card';
    const rows=s.ev.map(e=>`<div class="detail-item">${e.st} ${e.di}m　<span style="color:var(--accent)">${e.tm}</span></div>`).join('');
    card.innerHTML=`<div class="card-header" onclick="toggleCard(this)"><div class="card-top"><div><div class="swimmer-name">${s.name}</div><div class="swimmer-yomi">${s.yomi}</div></div><div class="badge">${s.ev.length}種目</div></div><div class="card-meta"><span class="swimmer-team">🏊 ${s.sc}</span>${gradeAge(s)?`<span class="age-tag">${gradeAge(s)}</span>`:''}${genTags(s)}</div><div class="toggle-hint">▼ タップで出場種目を表示</div></div><div class="details">${rows}</div>`;
    c.appendChild(card);
  });
}

  if(!key){c.innerHTML='<div class="no-result"><div class="emoji">⚠️</div><p>種目を選んでください</p></div>';sb.style.display='none';return;}

  c.innerHTML='';

  }

function makeEntryRow(s,rank,curSt,curDi){

function toggleProg(row,det,gen,dist,stroke){
  const open=det.classList.toggle('show');row.classList.toggle('open');
  const ar=row.querySelector('.prog-arrow');if(ar)ar.textContent=open?'▲':'▼';
  if(open&&!det.dataset.loaded){
    const di=dist.replace(/[^\d]/g,'');const g=(gen==='女');
    let ent=eventEntries(stroke,di,g?'female':'male');
    ent.sort((a,b)=>tval(a.tm)-tval(b.tm)); // タイム順（速い人が上）
    det.innerHTML='';
    const sb=document.createElement('div');sb.className='status-bar';sb.style.display='block';
    sb.innerHTML=`${g?'🔴 女子':'🔵 男子'} ${stroke} ${dist} ・ <span>${ent.length}</span>名エントリー`;

      const nr=document.createElement('div');nr.className='no-result';nr.style.padding='24px';nr.innerHTML='<p>この種目のエントリーはありません</p>';det.appendChild(nr);

      ent.forEach((s,i)=>det.appendChild(makeEntryRow(s,i+1,stroke,di)));
    }
    det.dataset.loaded='1';
  }
}
function toggleCard(el){const card=el.closest('.swimmer-card');card.classList.toggle('open');el.querySelector('.toggle-hint').textContent=card.classList.contains('open')?'▲ 閉じる':'▼ タップで出場種目を表示';}
function quickSearch(team,chipEl){document.getElementById('searchInput').value=team;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));if(chipEl)chipEl.classList.add('active');doSearch(team);}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
(function(){const fi=document.getElementById('fixInput');if(fi)fi.addEventListener('keydown',e=>{if(e.key==='Enter')fixSearch();});})();
document.getElementById('searchInput').addEventListener('input',()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));});
function closeOverlay(){try{localStorage.setItem('guide_shown','1');}catch(e){}document.getElementById('overlay').style.display='none';}
try{if(localStorage.getItem('guide_shown'))document.getElementById('overlay').style.display='none';}catch(e){}
</script>
</body>
